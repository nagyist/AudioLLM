name: refresh stars

on:
  schedule:
    - cron: '23 4 * * 1'   # Mondays 04:23 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install matplotlib==3.10.0 numpy==2.1.3

      - name: Refresh docs/stars.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh CLI is preinstalled on ubuntu-latest and authenticates from GH_TOKEN.
          python3 scripts/refresh_stars.py

      - name: Regenerate README + docs/index.html + docs/data.json
        run: python3 format_input.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- docs/stars.json docs/index.html docs/data.json README.md model_release_timeline_vertical_listed.png; then
            echo "No changes; nothing to commit."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/stars.json docs/index.html docs/data.json README.md model_release_timeline_vertical_listed.png
          git commit -m "chore: weekly stars refresh (auto)"
          git push
